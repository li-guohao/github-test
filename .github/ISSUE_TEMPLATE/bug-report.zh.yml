name: Ikaros Bug 报告
title: "[Bug] "
description: 给 Ikaros 项目报告一个BUG
labels: [ "bug" ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您愿意抽空报告这个问题！我们非常感谢您为改善 ikaros 做出的贡献。

  - type: checkboxes
    attributes:
      label: 询问前的查询确认
      description: >
        请去我们的 [issues](https://github.com/li-guohao/ikaros/issues?q=is%3Aissue) 列表里查询下，是否已经有类似的问题存在。
      options:
        - label: >
            我已经在 [issues](https://github.com/li-guohao/ikaros/issues?q=is%3Aissue) 列表 里查询过，并且没找到类似的问题。
          required: true

  - type: dropdown
    attributes:
      label: Ikaros 组件
      description: |
        请问是 Ikaros 哪个组件的问题？ Ikaros 有很多子项目，请确认你选择的组件是对应这个BUG的组件。
      multiple: false
      options:
        - "后端组件 (li-guohao/ikaros)"
        - "前端后台组件 (li-guohao/ikaros-admin)"
    validations:
      required: true

  - type: textarea
    attributes:
      label: 发生了什么？
      description: 描述下发生了什么
      placeholder: >
        请描述下发生了什么
    validations:
      required: true

  - type: textarea
    attributes:
      label: 预期是什么？
      description: 你预期是什么样的行为(或动作)？
      placeholder: >
        请解释下你为什么认为这个行为(或动作)是不符合预期的。并请您复制粘贴下 具体的错误日志或者UI截图，您也可以通过拖放对应的文件到下方上传文件。
        如果日志内容太长，可以用这个格式包裹起来：<details><summary>x.log</summary> 很长的日志内容</details>
        
        **注意**：请复制粘贴文本，不要上传一个日志截图，截图尽量不要用(除了UI问题外)，文本日志方便搜索定位问题
    validations:
      required: true

  - type: textarea
    attributes:
      label: 如何去复现？
      description: >
        这个问题如何去复现，如果您没法提供相对准确的复现步骤，请开个 [Discussion](https://github.com/li-guohao/ikaros/discussions)
      placeholder: >
        Please make sure you provide a reproducible step-by-step case of how to reproduce the problem
        as minimally and precisely as possible. Keep in mind we do not have access to your deployment.
        Remember that non-reproducible issues will be closed! Opening a discussion is recommended as a
        first step.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Anything else
      description: Anything else we need to know?
      placeholder: >
        How often does this problem occur? (Once? Every time? Only when certain conditions are met?)
        Any relevant logs to include? Put them here inside fenced
        ``` ``` blocks or inside a collapsable details tag if it's too long:
        <details><summary>x.log</summary> lots of stuff </details>

  - type: checkboxes
    attributes:
      label: Are you willing to submit PR?
      description: >
        This is absolutely not required, but we are happy to guide you in the contribution process
        especially if you already have a good understanding of how to implement the fix.
      options:
        - label: Yes I am willing to submit a PR!
          required: false


  - type: markdown
    attributes:
      value: "Thanks for completing our form!"
